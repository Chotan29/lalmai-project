<svg width="680" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <rect width="680" height="980" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Fast SMS Architecture — Webhook + Priority Queue</text>

  <!-- ══════════════════════════════════════
       COMPARISON: OLD vs NEW
  ══════════════════════════════════════ -->
  <text x="170" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#A32D2D">আগের architecture</text>
  <text x="170" y="70" text-anchor="middle" font-size="11" fill="#A32D2D">SMS আসতে ~60-180 সেকেন্ড</text>

  <text x="510" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#27500A">নতুন architecture</text>
  <text x="510" y="70" text-anchor="middle" font-size="11" fill="#27500A">SMS আসবে ~3-8 সেকেন্ডে</text>

  <!-- Divider -->
  <line x1="340" y1="42" x2="340" y2="310" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- OLD: boxes -->
  <rect x="60" y="82" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="170" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Face scan on device</text>

  <line x1="170" y1="126" x2="170" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="60" y="148" width="220" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="170" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">Kernel scheduler</text>
  <text x="170" y="186" text-anchor="middle" font-size="11" fill="#791F1F">Wait up to 60 sec to run</text>

  <line x1="170" y1="200" x2="170" y2="222" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="60" y="222" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="170" y="239" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Vendor API pull</text>
  <text x="170" y="256" text-anchor="middle" font-size="11" fill="#5F5E5A">Page-by-page, sequential</text>

  <line x1="170" y1="266" x2="170" y2="288" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="60" y="288" width="220" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="170" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">Default queue</text>
  <text x="170" y="326" text-anchor="middle" font-size="11" fill="#791F1F">Mixed priority, slow drain</text>

  <line x1="170" y1="340" x2="170" y2="362" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="60" y="362" width="220" height="36" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="170" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">SMS sent (~60-180s later)</text>

  <!-- NEW: boxes -->
  <rect x="400" y="82" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="510" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Face scan on device</text>

  <line x1="510" y1="126" x2="510" y2="148" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>
  <rect x="400" y="148" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="510" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Vendor webhook push</text>
  <text x="510" y="186" text-anchor="middle" font-size="11" fill="#0F6E56">Instant POST to Laravel</text>

  <line x1="510" y1="200" x2="510" y2="222" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>
  <rect x="400" y="222" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="510" y="239" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Attendance save</text>
  <text x="510" y="256" text-anchor="middle" font-size="11" fill="#0F6E56">Immediate, no wait</text>

  <line x1="510" y1="266" x2="510" y2="288" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>
  <rect x="400" y="288" width="220" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="510" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">High-priority SMS queue</text>
  <text x="510" y="326" text-anchor="middle" font-size="11" fill="#27500A">Dedicated worker, Redis</text>

  <line x1="510" y1="340" x2="510" y2="362" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#ag2)"/>
  <rect x="400" y="362" width="220" height="36" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="510" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">SMS sent (~3-8s later)</text>

  <!-- ══════════════════════════════════════
       NEW DETAILED ARCHITECTURE
  ══════════════════════════════════════ -->
  <line x1="40" y1="418" x2="640" y2="418" stroke="#e0e0e0" stroke-width="1"/>
  <text x="340" y="442" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">নতুন architecture — বিস্তারিত flow</text>

  <!-- ZONE 1: Vendor side -->
  <rect x="36" y="456" width="608" height="104" rx="10" fill="none" stroke="#c0c0c0" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="52" y="472" font-size="10" fill="#aaa">Vendor side (unchanged)</text>

  <rect x="56" y="478" width="152" height="62" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="132" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Biometric device</text>
  <text x="132" y="520" text-anchor="middle" font-size="10" fill="#5F5E5A">Face scan + punch</text>

  <line x1="208" y1="509" x2="234" y2="509" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="234" y="478" width="168" height="62" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="318" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Vendor cloud</text>
  <text x="318" y="520" text-anchor="middle" font-size="10" fill="#5F5E5A">Stores log, fires webhook</text>

  <line x1="402" y1="509" x2="432" y2="509" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>

  <rect x="432" y="478" width="188" height="62" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="526" y="498" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Webhook POST</text>
  <text x="526" y="514" text-anchor="middle" font-size="10" fill="#0F6E56">Instant HTTP push</text>
  <text x="526" y="530" text-anchor="middle" font-size="10" fill="#0F6E56">to Laravel endpoint</text>

  <!-- ZONE 2: Laravel app -->
  <rect x="36" y="578" width="608" height="252" rx="10" fill="none" stroke="#c0c0c0" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="52" y="594" font-size="10" fill="#aaa">Laravel app (new webhook controller)</text>

  <!-- arrow from webhook into app -->
  <line x1="526" y1="540" x2="526" y2="574" stroke="#1D9E75" stroke-width="1.5"/>
  <path d="M526 574 L526 608 L460 608" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>

  <rect x="260" y="594" width="200" height="62" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="360" y="618" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">WebhookController</text>
  <text x="360" y="636" text-anchor="middle" font-size="10" fill="#0F6E56">Validate signature, parse</text>

  <line x1="360" y1="656" x2="360" y2="678" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>

  <rect x="210" y="678" width="300" height="62" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="360" y="700" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">applyLogRow (reuse existing)</text>
  <text x="360" y="718" text-anchor="middle" font-size="10" fill="#3C3489">Match student, save attendance row</text>

  <!-- Branch: two arrows from applyLogRow -->
  <path d="M290 740 L200 770" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ap)"/>
  <path d="M430 740 L530 770" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="56" y="770" width="288" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="200" y="791" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">High-priority SMS queue</text>
  <text x="200" y="809" text-anchor="middle" font-size="10" fill="#27500A">queue:sms — dedicated Redis list</text>

  <rect x="376" y="770" width="252" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="502" y="791" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Fallback scheduler (keep)</text>
  <text x="502" y="809" text-anchor="middle" font-size="10" fill="#5F5E5A">Safety net — webhook miss হলে</text>

  <!-- ZONE 3: Workers -->
  <rect x="36" y="840" width="608" height="90" rx="10" fill="none" stroke="#c0c0c0" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="52" y="856" font-size="10" fill="#aaa">Queue workers (supervisor config)</text>

  <line x1="200" y1="822" x2="200" y2="866" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#ag2)"/>

  <rect x="56" y="866" width="288" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="200" y="887" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">SMS worker (--queue=sms)</text>
  <text x="200" y="905" text-anchor="middle" font-size="10" fill="#27500A">3-5 processes, only SMS jobs</text>

  <rect x="376" y="866" width="252" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="502" y="887" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Default worker</text>
  <text x="502" y="905" text-anchor="middle" font-size="10" fill="#5F5E5A">Other jobs — report, sync</text>

  <!-- Legend -->
  <rect x="36" y="944" width="608" height="26" rx="8" fill="#f7f7f5" stroke="#e0e0e0" stroke-width="0.8"/>
  <rect x="52" y="953" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="68" y="962" font-size="10" fill="#555">Webhook — নতুন</text>
  <rect x="180" y="953" width="10" height="10" rx="2" fill="#639922"/>
  <text x="196" y="962" font-size="10" fill="#555">Priority queue — নতুন</text>
  <rect x="330" y="953" width="10" height="10" rx="2" fill="#7F77DD"/>
  <text x="346" y="962" font-size="10" fill="#555">Existing reuse</text>
  <rect x="444" y="953" width="10" height="10" rx="2" fill="#888780"/>
  <text x="460" y="962" font-size="10" fill="#555">Unchanged</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ag2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
